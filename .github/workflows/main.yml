name: بناء تطبيق مصروفي APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet>=0.24.0

    - name: Build APK
      run: yes | flet build apk --verbose
      env:
        CI: true
        FLET_CLI_NO_RICH: 1
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: masroofi-app
        path: build/apk/*.apk
        if-no-files-found: error
