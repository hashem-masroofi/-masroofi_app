name: بناء تطبيق مصروفي APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: تحميل الكود
      uses: actions/checkout@v4

    - name: تثبيت بايثون
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: تثبيت Flet
      run: pip install flet

    - name: بناء APK
      run: flet build apk --verbose

    - name: رفع ملف الـ APK
      uses: actions/upload-artifact@v4
      with:
        name: masroofi-app
        path: build/apk/*.apk
